<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Otis Skryba</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1115;
      color: #f5f5f5;
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      width: min(1100px, 90%);
      margin: 0 auto;
    }

    header {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 0;
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: center;
    }

    .hero-text h1 {
      font-size: clamp(3rem, 7vw, 5rem);
      line-height: 1;
      margin-bottom: 1rem;
    }

    .hero-text p {
      font-size: 1.2rem;
      opacity: 0.8;
      margin-bottom: 2rem;
      max-width: 500px;
    }

    .buttons {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .button {
      padding: 0.9rem 1.4rem;
      border-radius: 12px;
      transition: 0.2s ease;
      font-weight: 600;
    }

    .button-primary {
      background: white;
      color: black;
    }

    .button-primary:hover {
      transform: translateY(-2px);
    }

    .button-secondary {
      border: 1px solid rgba(255,255,255,0.2);
    }

    .button-secondary:hover {
      background: rgba(255,255,255,0.05);
    }

    .hero-image img {
      width: 100%;
      border-radius: 24px;
      display: block;
    }

    section {
      padding: 6rem 0;
    }

    h2 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    .about p {
      max-width: 700px;
      opacity: 0.85;
    }

    footer {
      padding: 3rem 0;
      opacity: 0.5;
      text-align: center;
      font-size: 0.9rem;
    }

    @media (max-width: 800px) {
      .hero {
        grid-template-columns: 1fr;
      }

      .hero-image {
        order: -1;
      }

      .hero-text h1 {
        font-size: 3rem;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="container hero">

      <div class="hero-text">
        <h1>Otis Skryba</h1>

        <p>
          PJAIT student interested in graphic design and new media art.
        </p>

        <div class="buttons">
          <a class="button button-primary" href="https://github.com/">
            Portfolio
          </a>

          <a class="button button-secondary" href="mailto:anna@makowska.design">
            Contact
          </a>
        </div>
      </div>

      <div class="hero-image">
        <img src="/images/profile.webp" alt="Profile photo">
      </div>

    </div>
  </header>

  <section class="about">
    <div class="container">

      <h2>About</h2>

      <p>
        I work on projects related to graphic design and new media art.
        I am also interested in digital art, 3D graphics.
      </p>

    </div>
  </section>

  <footer>
    <div class="container">
      © 2026 Anna Makowska
    </div>
  </footer>

</body>
</html>
